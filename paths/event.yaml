/event/endpoints:
  get:
    tags: ["Event (Webhook Service)"]
    summary: Webhook 목록 조회
    operationId: getWebhookEndpointsV1
    description: |
      등록된 모든 Webhook 엔드포인트 목록을 조회합니다. 
      연동 개발자는 본인이 등록한 URL과 활성화된 이벤트 목록을 확인할 수 있습니다.

      *참고: 웹훅 엔드포인트는 한 사업자당 등록 개수가 소수로 제한되므로(일반적으로 10개 미만), 시스템 일관성보다는 관리 편의를 위해 페이징(Pagination) 없이 전체 목록을 반환합니다.*
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
    responses:
      '200':
        description: "등록된 Webhook 엔드포인트 목록을 성공적으로 조회하였습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
        content:
          application/json:
            schema:
              type: array
              items: { $ref: '../components/schemas/index.yaml#/WebhookEndpointResV1' }
      '400': 
        description: "잘못된 요청 형식입니다."
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401': 
        description: "인증 실패입니다. 유효하지 않은 토큰이거나 인증서가 누락되었습니다."
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403': 
        description: "권한 부족입니다. 웹훅 목록을 조회할 권한이 없는 파티의 요청입니다."
        $ref: '../components/responses/index.yaml#/Forbidden'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500': 
        description: "서버 내부 오류가 발생했습니다."
        $ref: '../components/responses/index.yaml#/InternalServerError'

  post:
    tags: ["Event (Webhook Service)"]
    summary: Webhook 등록
    operationId: postEndpointV1
    description: |
      새로운 Webhook 엔드포인트를 등록합니다. 
      
      **연동 개발자 가이드:**
      1. **URL:** 이벤트를 수신할 서버의 HTTPS 공개 URL이어야 합니다.
      2. **Enabled Events:** 수신하고자 하는 이벤트 코드를 지정합니다 (예: `contract.created.for.oem`).
      3. **WMI/ProviderId:** 특정 제조사나 사업자의 이벤트만 필터링하려면 지정합니다.

      **보안 및 검증 (Security & Verification):**
      시스템은 Webhook 메시지의 무결성을 보장하기 위해 모든 요청 헤더에 `KPNC-Signature`를 포함합니다. 수신 측에서는 다음 절차에 따라 요청을 검증해야 합니다.

      1. **방식:** HMAC-SHA256
      2. **키 (Key):** 엔드포인트 등록 시 발급된 `secret`
      3. **데이터 (Data):** HTTP Request Body (JSON String 전체)
      4. **검증:** 생성된 해시값과 `KPNC-Signature` 헤더값이 일치하는지 확인 (Constant-time comparison 권장)

      **코드 예시 (Java/Spring):**
      ```java
      @PostMapping("/webhooks")
      public ResponseEntity<Void> handleWebhook(@RequestBody String payload, 
                                               @RequestHeader("KPNC-Signature") String signature) {
          String expected = hmacSha256(payload, secret);
          if (!MessageDigest.isEqual(expected.getBytes(), signature.getBytes())) {
              return ResponseEntity.status(HttpStatus.UNAUTHORIZED).build();
          }
          // 이벤트 처리 로직
          return ResponseEntity.ok().build();
      }
      ```

      등록 성공 시 반환되는 `secret` 값은 이후 Webhook 메시지의 무결성 검증(HMAC SHA-256)에 사용되므로 반드시 안전하게 보관해야 합니다.

      *참고: 각 이벤트 발생 시 수신하게 될 상세 페이로드 구조는 OpenAPI 스펙의 `WebhookEventV1` 스키마를 참조하십시오.*
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/index.yaml#/PostEndpointReqV1' }
          examples:
            OEM_Integration:
              summary: "OEM용 계약 생성 알림 등록"
              value:
                url: "https://api.oem-backend.kr/v1/webhooks/pnc"
                enabledEvents: ["contract.created.for.oem", "contract.updated.for.oem"]
                wmiList: ["KNA", "KHL"]
                description: "신규 계약 발생 시 OEM 백엔드로 즉시 알림"
    responses:
      '201':
        description: "Webhook 엔드포인트가 성공적으로 등록되었습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
        content:
          application/json:
            schema: { $ref: '../components/schemas/index.yaml#/WebhookEndpointResV1' }
      '400': 
        description: "잘못된 요청입니다. 유효하지 않은 URL 형식이거나 지원하지 않는 이벤트 코드가 포함되어 있습니다."
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401': 
        description: "인증 실패입니다."
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403': 
        description: "권한 부족입니다. 웹훅을 등록할 권한이 없는 파티의 요청입니다."
        $ref: '../components/responses/index.yaml#/Forbidden'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500': 
        description: "서버 내부 오류가 발생했습니다."
        $ref: '../components/responses/index.yaml#/InternalServerError'
    x-codeSamples:
      - lang: 'cURL'
        label: 'Webhook 등록 예시'
        source: |
          curl -X POST "https://api.kpnc-protocol.kr/v1/event/endpoints" \
            -H "KPNC-From-Party-Type: oem" \
            -H "KPNC-From-Party-Id: KR-OEM-01" \
            -H "Content-Type: application/json" \
            -d '{
              "url": "https://callback.oem.com/events",
              "enabledEvents": ["contract.created.for.oem"],
              "description": "PnC Event Receiver"
            }'

/event/endpoints/{id}:
  get:
    tags: ["Event (Webhook Service)"]
    summary: Webhook 단건 조회
    operationId: getWebhookEndpointV1
    description: |
      특정 Webhook 엔드포인트의 설정 상태 및 `secret`을 확인합니다.
      `secret`은 Webhook 메시지 수신 시 무결성 검증을 위한 HMAC 키로 사용되므로, 보안을 위해 안전한 곳에 저장하십시오.
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
      - name: id
        in: path
        required: true
        description: "엔드포인트 식별자 (UUID)"
        schema: { type: string, format: uuid }
    responses:
      '200':
        description: "Webhook 엔드포인트 상세 정보를 성공적으로 조회하였습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
        content:
          application/json:
            schema: { $ref: '../components/schemas/index.yaml#/WebhookEndpointResV1' }
      '400': 
        description: "잘못된 식별자(UUID) 형식입니다."
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401': 
        description: "인증 실패입니다."
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403': 
        description: "권한 부족입니다. 타인의 엔드포인트 정보를 조회할 수 없습니다."
        $ref: '../components/responses/index.yaml#/Forbidden'
      '404':
        description: "존재하지 않는 엔드포인트입니다. 식별자를 다시 확인하십시오."
        $ref: '../components/responses/index.yaml#/NotFound'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500': 
        description: "서버 내부 오류입니다."
        $ref: '../components/responses/index.yaml#/InternalServerError'

  put:
    tags: ["Event (Webhook Service)"]
    summary: Webhook 수정
    operationId: updateWebhookEndpointV1
    description: |
      엔드포인트의 URL, 수신 이벤트 목록, 또는 활성화 상태(`status`)를 변경합니다.
      시스템 점검 등으로 일시적으로 알림을 중단하려면 `status`를 `disabled`로 수정하십시오.
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
      - name: id
        in: path
        required: true
        description: "수정할 엔드포인트 식별자 (UUID)"
        schema: { type: string, format: uuid }
    requestBody:
      required: true
      content:
        application/json:
          schema: { $ref: '../components/schemas/index.yaml#/PostEndpointReqV1' }
    responses:
      '200':
        description: "Webhook 엔드포인트 정보가 성공적으로 수정되었습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
        content:
          application/json:
            schema: { $ref: '../components/schemas/index.yaml#/WebhookEndpointResV1' }
      '400': 
        description: "수정 요청 데이터의 형식이 잘못되었거나 유효하지 않은 URL입니다."
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401': 
        description: "인증 실패입니다."
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403': 
        description: "권한 부족입니다. 본인이 등록한 웹훅만 수정할 수 있습니다."
        $ref: '../components/responses/index.yaml#/Forbidden'
      '404': 
        description: "수정할 엔드포인트를 찾을 수 없습니다."
        $ref: '../components/responses/index.yaml#/NotFound'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500': 
        description: "서버 내부 오류로 수정에 실패했습니다."
        $ref: '../components/responses/index.yaml#/InternalServerError'

  delete:
    tags: ["Event (Webhook Service)"]
    summary: Webhook 삭제
    operationId: deleteWebhookEndpointV1
    description: |
      Webhook 엔드포인트를 영구적으로 제거합니다.
      삭제 후에는 해당 URL로 더 이상 이벤트 알림이 전송되지 않으며, 이 작업은 복구할 수 없습니다.
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
      - name: id
        in: path
        required: true
        description: "삭제할 엔드포인트 식별자 (UUID)"
        schema: { type: string, format: uuid }
    responses:
      '204': 
        description: "Webhook 엔드포인트가 성공적으로 삭제되었습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
      '400': 
        description: "잘못된 식별자 형식입니다."
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401': 
        description: "인증 실패입니다."
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403': 
        description: "권한 부족입니다. 본인이 등록한 웹훅만 삭제할 수 있습니다."
        $ref: '../components/responses/index.yaml#/Forbidden'
      '404': 
        description: "삭제할 엔드포인트를 찾을 수 없습니다."
        $ref: '../components/responses/index.yaml#/NotFound'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500': 
        description: "서버 내부 오류로 삭제에 실패했습니다."
        $ref: '../components/responses/index.yaml#/InternalServerError'
