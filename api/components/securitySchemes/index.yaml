OAuth2_Auth:
  type: oauth2
  description: |
    **OAuth2 기반 토큰 인증 (Client Credentials Flow)**
    
    세부적인 역할 기반 접근 제어(RBAC)와 확장성을 고려한 JWT 토큰 인증 방식입니다. 
    '서비스별 접근 권한 매핑 표'에 정의된 권한에 따라 다음 Scopes가 부여됩니다.

    **[연동 및 검증 로직]**
    1. **Identity Linkage:** JWT의 `sub` (Subject) 클레임 또는 별도로 정의된 커스텀 클레임(`party_id`) 값이 요청 헤더의 `KPNC-From-Party-Id`와 일치해야 합니다. 불일치 시 타인 사칭으로 간주합니다.
    2. **Scope-based Control:** 토큰 내에 포함된 `scopes`를 통해 API 서비스 도메인별 접근 권한을 제어합니다.

  flows:
    clientCredentials:
      tokenUrl: https://api.kpnc-protocol.kr/oauth/token
      scopes: 
        # RCP (Root Certificate Pool)
        rcp:read: "Root 인증서 목록 및 상세 조회 권한 (전 사업자)"
        
        # PCP (Provisioning Certificate Pool)
        pcp:read: "차량 존재 확인 및 Provisioning 인증서 조회 권한 (OEM, eMSP, CPS)"
        pcp:write: "Provisioning 인증서 등록/갱신 및 삭제 권한 (OEM)"
        
        # CPS (Contract Provisioning Service)
        cps:read: "CPS 인증서 체인 조회 권한 (전 사업자)"
        cps:write: "계약 데이터 CPS 서명 요청 권한 (eMSP)"
        
        # CCP (Contract Certificate Pool)
        ccp:read: "계약 메타데이터 및 서명된 계약 데이터 조회 권한 (CPO, OEM, eMSP)"
        ccp:write: "계약 데이터 게시 철회 권한 (eMSP)"
        
        # eMSP (Managed) Service
        emsp:managed: "위임 관리 모델 기반 계약 발급/상태조회/해지 권한 (eMSP)"
        
        # PKI Service
        pki:write: "인증서 발급 및 폐지 요청 권한 (CPO)"
        
        # Event Service
        event:manage: "Webhook 엔드포인트 관리 권한 (전 사업자)"
        
        # System Operator
        operator: "RCP 쓰기/삭제 및 시스템 전역 관리 권한 (Trust Operator 전용)"
