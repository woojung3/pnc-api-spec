PcidV1: 
  type: string
  minLength: 17
  maxLength: 255
  description: |
    차량의 고유 식별자인 PCID(Provisioning Certificate Identifier)입니다.
    
    **[ABNF 구조 (ISO 15118)]**
    `<PCID> = <WMI> <OEM's own unique ID> <check digit>`
    
    **[데이터 처리 및 보안 정책]**
    - **WMI 권한 검증:** 시스템은 PCID의 첫 3자리인 WMI(World Manufacturer Identifier)를 추출하여 해당 OEM 계정의 등록/관리 권한을 엄격히 검증합니다.
    - **대소문자:** PCID는 대소문자를 구분(Case-sensitive)하는 문자열로 처리됩니다.
ProviderIdV1:
  type: string
  pattern: '^[A-Z0-9]{3}$'
  description: "CPO 또는 서비스 제공자(Provider)를 식별하는 3자리 영문 대문자 및 숫자 코드입니다. 각 사업자에게 고유하게 할당됩니다."
EmaidV1: 
  type: string
  pattern: '^[A-Z]{2}[-][A-Z0-9]{3}[-][A-Z0-9]{6,29}([-][A-Z0-9]{1})?$'
  minLength: 14
  maxLength: 38
  description: |
    사용자의 계약 식별자인 eMAID(e-Mobility Account Identifier)입니다.
    
    **[ABNF 구조 (ISO 15118)]**
    `<EMAID> = <Country Code> <S> <Provider ID> <S> <eMA Instance> <S> <Check Digit>`
    
    **[데이터 정규화 정책]**
    - **입력:** API 요청 시에는 반드시 하이픈(`-`)이 포함된 표준 형식을 준수해야 합니다 (예: `KR-KHL-C12345678`).
    - **정규화:** 시스템 내부 저장 및 차량 전송용 EXI 생성 시에는 모든 하이픈이 제거되고 영문 대문자로 변환된 14~35자의 문자열로 처리됩니다.
EvseIdV1:
  type: string
  pattern: '^[A-Z]{2}[\*]?\w{3}[\*]?[E][\w\*]{1,30}$'
  description: |
    충전 포인트의 고유 식별자인 EVSEID입니다.
    ISO 15118 및 DIN 70121 규격을 준수하며, 국가 코드와 사업자 ID, 그리고 충전기 고유 번호를 포함합니다.
    
    **[ABNF 구조]**
    `<Country Code> <S> <EVSE Operator ID> <S> <ID Type> <EVSE ID>`
    - 예시: `KR*PNP*E12345678` (S는 선택적 구분자 `*`)
PartyTypeV1: { type: string, enum: [oem, emsp, cpo, cps, pki, pcp, ccp, operator] }
PkiTypeV1: { type: string, enum: [v2g, oem, emsp, pe] }
XsdMsgDefNamespaceV1: { type: string, enum: ["urn:iso:15118:2:2013:MsgDef", "urn:iso:15118:20:2020:MsgDef"] }

CertificateChainV1:
  type: object
  required: [certificate, subCa1Certificate]
  properties:
    certificate: 
      type: string
      maxLength: 16384
      pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
      description: "Base64 DER로 인코딩된 리프(Leaf) 인증서입니다."
    subCa1Certificate: 
      type: string
      maxLength: 16384
      pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
      description: "Base64 DER로 인코딩된 sub CA 인증서입니다."
    subCa2Certificate: 
      type: string
      maxLength: 16384
      pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
      description: "Base64 DER로 인코딩된 sub CA 인증서입니다. (optional)"

RootCertificateV1:
  type: object
  # [2026-06-23 회의 합의] rootAuthorityKeyIdentifier(AKID)를 required에서 제외함.
  # 사유: ISO 15118-2 인증서 프로파일에서 AKID는 Optional이며, 현대차 루트 등 실제 발급 인증서에 AKID가 없는 사례가 존재함.
  required: [caCertificate, rootTypeList]
  properties:
    rootCertificateId:
      type: string
      format: uuid
      readOnly: true
      description: "시스템에서 생성한 고유 식별자입니다."
    # [2026-06-23 회의 합의] 전기연구원 제안에 따라 RCP 응답의 파싱정보(distinguishedName/commonName/organizationName)를
    # 일관성을 위해 일괄 제거함. 해당 정보는 caCertificate(인증서 본문) 내부에 모두 포함되어 있으므로, 필요한 경우 연동사가 직접 파싱한다.
    caCertificate:
      type: string
      maxLength: 16384
      pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
      description: "Base64 DER로 인코딩된 root 인증서입니다."
    fingerprint: 
      type: string
      pattern: '^[0-9a-fA-F]{64}$'
      readOnly: true
      description: "서버에서 계산한 인증서의 SHA-256 지문입니다. (Informative)"
    rootCtlList:
      type: array
      items: { type: string, enum: ["European CTL", "American CTL", "Korean CTL", "No CTL"] }
      default: ["No CTL"]
      example: ["Korean CTL"]
      description: |
        해당 Root CA가 포함될 신뢰 목록(CTL)의 리스트입니다. 
        운용 계획이 확정되지 않은 경우를 대비하여 기본값으로 `["No CTL"]`이 할당됩니다.
    rootTypeList:
      type: array
      items: { type: string, enum: [v2g, oem, emsp, pe] }
    rootAuthorityKeyIdentifier: 
      type: string
      pattern: '^([0-9a-fA-F]{2}:)*[0-9a-fA-F]{2}$'
      maxLength: 128
      description: |
        Root CA의 Authority Key Identifier (또는 SKI)입니다.

        본 필드는 **ISO 15118-2 인증서 프로파일 기준 Optional**이므로 필수(Required)가 아닙니다.
        X.509 CA 인증서에는 일반적으로 기재하는 것이 권장됩니다. 가능한 경우 기재할 것을 권고합니다.

        **[검증 정책]**
        1. **상호 검증:** 서버는 인증서(`caCertificate`) 내부에서 추출한 AKID 값과 본 인자로 전달된 값을 엄격히 대조합니다. 두 값이 모두 존재할 경우 반드시 일치해야 하며, 불일치 시 `400 Bad Request`가 반환됩니다.
        2. **식별자 할당:** 일부 표준 미준수 인증서와 같이 내부에 AKID 확장 필드가 누락된 경우, 본 인자로 전달된 값을 해당 Root의 공식 식별자로 확정하여 시스템에 등록합니다.
        3. **용도:** ISO 15118 프로토콜 수행 시 차량 및 eMSP가 해당 Root를 식별하기 위한 주요 키로 사용됩니다.
    certificateValidFrom: 
      type: string
      format: date-time
      readOnly: true
    certificateValidTo: 
      type: string
      format: date-time
      readOnly: true

ProvisioningCertificateDataV1:
  type: object
  description: |
    차량의 Provisioning 인증서 체인 및 관련 메타데이터입니다.
    리소스 식별을 위한 PCID는 API 경로(Path Parameter)를 통해 관리되므로, 응답 바디의 중복을 피하기 위해 본 스키마에서는 제외되었습니다.
  required: [provisioningCertificateChain, xsdMsgDefNamespace]
  properties:
    provisioningCertificateChain: { $ref: '#/CertificateChainV1' }
    xsdMsgDefNamespace: { $ref: '#/XsdMsgDefNamespaceV1' }
    v2gRootAuthorityKeyIdentifiers:
      type: array
      items: { type: string, pattern: '^([0-9a-fA-F]{2}:)*[0-9a-fA-F]{2}$', maxLength: 128 }
      description: |
        차량(EV)이 신뢰하는 V2G Root CA들의 Authority Key Identifier(AKID) 목록입니다.

        **[멀티 루트 환경 지원]**
        국가 Root와 글로벌 Root를 동시에 신뢰하는 환경을 지원하기 위해 배열 형식을 사용합니다.
        - **우선순위:** 배열의 첫 번째 요소(`index 0`)를 주(Primary) 신뢰 앵커로 간주하는 것을 권장합니다.
        - **동작 방식:** eMSP 및 CPS 시스템은 이 목록에 포함된 AKID들과 일치하는 Root CA를 검색하여, 차량이 수용 가능한 최적의 신뢰 앵커를 기반으로 계약 인증서 발급 및 서명을 진행합니다.
    fingerprint: 
      type: string
      pattern: '^[0-9a-fA-F]{64}$'
      maxLength: 64
      description: "Provisioning 인증서의 SHA-256 지문입니다. 차량 식별 및 인증서 정합성 확인에 사용됩니다."

CpsCertificateChainDataV1:
  type: object
  required: [cpsDistinguishedName, cpsCertificateChain, organizationName]
  properties:
    cpsDistinguishedName: { type: string, pattern: '^((CN|OU|O|C|DC|ST)=[^,]+,? ?)+$', maxLength: 512 }
    cpsCertificateChain: { $ref: '#/CertificateChainV1' }
    organizationName: { type: string, minLength: 1, maxLength: 256 }
    cpsV2GRootCertificateFingerprint: { type: string, pattern: '^[0-9a-fA-F]{64}$', maxLength: 64 }
    cpsV2GRootDistinguishedName: { type: string, pattern: '^((CN|OU|O|C|DC|ST)=[^,]+,? ?)+$', maxLength: 512 }
    certificateValidFrom: { type: string, format: date-time }
    certificateValidTo: { type: string, format: date-time }

ContractCertificateBundleV1:
  type: object
  required: [pcid, emaid, contractCertificateChain, contractSignatureEncryptedPrivateKey, dhPublicKey]
  properties:
    pcid: { $ref: '#/PcidV1' }
    emaid: { $ref: '#/EmaidV1' }
    contractCertificateChain: { $ref: '#/CertificateChainV1' }
    contractSignatureEncryptedPrivateKey: 
      type: string
      minLength: 1
      maxLength: 16384
      pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
      description: |
        차량의 Provisioning Public Key로 암호화된 계약 프라이빗 키입니다.
        
        - **인코딩:** Base64 (Binary Data)
        - **표준 참조:** ISO 15118-2 `encryptedPrivateKey` (secp256r1 사용 시 48 bytes binary)
    dhPublicKey: 
      type: string
      minLength: 1
      maxLength: 16384
      pattern: '^(?:[A-Za-z0-9+/]{4})*(?:[A-Za-z0-9+/]{2}==|[A-Za-z0-9+/]{3}=)?$'
      description: |
        ISO 15118에서 정의된 Diffie-Hellman 공개키입니다.
        
        - **인코딩:** Base64 (Binary Data)
        - **표준 참조:** ISO 15118-2 `dhPublicKey` (65 bytes uncompressed curve point: 0x04 || X || Y)

SignedContractDataV1:
  type: object
  required: [emaid, pcid, certificateInstallationRes, xsdMsgDefNamespace]
  properties:
    emaid: { $ref: '#/EmaidV1' }
    pcid: { $ref: '#/PcidV1' }
    certificateInstallationRes: 
      type: string
      minLength: 1
      maxLength: 16384
      description: |
        ISO 15118 `certificateInstallationRes` 메시지의 Base64 인코딩된 EXI 본문입니다.
        
        - **인코딩:** Base64 (EXI Binary)
        - **표준 참조:** ISO 15118-2/20 `certificateInstallationRes`
    xsdMsgDefNamespace: { $ref: '#/XsdMsgDefNamespaceV1' }
    cpsV2GRootCertificateFingerprint: { type: string, pattern: '^[0-9a-fA-F]{64}$' }
    cpsV2GRootDistinguishedName: { type: string, pattern: '^((CN|OU|O|C|DC|ST)=[^,]+,? ?)+$' }
    metadata: { type: string }

PnCErrorTypeV1:
  type: string
  description: "문제 유형을 식별하는 고유 식별자(URN)입니다. 연동사는 본 값을 기반으로 기계적인 분기 처리를 수행해야 합니다."
  enum:
    - urn:pnc:error:common:parameter-invalid
    - urn:pnc:error:common:unauthorized
    - urn:pnc:error:common:access-denied
    - urn:pnc:error:common:resource-not-found
    - urn:pnc:error:common:already-exists
    - urn:pnc:error:common:internal-error
    - urn:pnc:error:rcp:invalid-root-cert
    - urn:pnc:error:rcp:root-cert-expired
    - urn:pnc:error:rcp:no-valid-root-found
    - urn:pnc:error:rcp:delete-not-allowed
    - urn:pnc:error:pcp:invalid-pcid
    - urn:pnc:error:pcp:cert-format-invalid
    - urn:pnc:error:pcp:cert-mismatch
    - urn:pnc:error:pcp:prov-cert-not-found
    - urn:pnc:error:pcp:storage-failure
    - urn:pnc:error:ccp:invalid-emaid
    - urn:pnc:error:ccp:contract-already-exists
    - urn:pnc:error:ccp:mapping-mismatch
    - urn:pnc:error:ccp:certificate-unavailable
    - urn:pnc:error:ccp:invalid-exi-format
    - urn:pnc:error:ccp:query-failure
    - urn:pnc:error:cps:signing-failure
    - urn:pnc:error:cps:engine-error
    - urn:pnc:error:cps:revocation-not-allowed
    - urn:pnc:error:pki:invalid-csr
    - urn:pnc:error:pki:csr-verification-failed
    - urn:pnc:error:pki:policy-violation
    - urn:pnc:error:pki:validity-out-of-range
    - urn:pnc:error:pki:sub-ca-unavailable
    - urn:pnc:error:pki:revocation-error
    - urn:pnc:error:event:delivery-failure
    - urn:pnc:error:event:endpoint-unavailable
    - urn:pnc:error:system:unknown

ProblemDetailV1:
  type: object
  required: [type, title, status, detail]
  properties:
    type: 
      $ref: '#/PnCErrorTypeV1'
    title: 
      type: string
      minLength: 1
      description: "에러 유형에 대한 요약입니다 (인간 판독용)."
    status: 
      type: integer
      minimum: 100
      maximum: 599
      description: "발생한 에러에 적합한 HTTP 상태 코드입니다."
    detail: 
      type: string
      minLength: 1
      description: "에러 발생 원인에 대한 상세한 설명입니다."
    instance: 
      type: string
      format: uri
      description: "에러가 발생한 구체적인 리소스 식별자입니다."
    errorMessages: 
      type: array
      items: { type: string, minLength: 1 }
      description: "검증 에러 등 여러 사유가 겹칠 경우 상세 메시지 목록을 담습니다."
    timestamp: 
      type: string
      format: date-time
      description: "에러 발생 시각입니다."

WebhookEndpointResV1:
  type: object
  required: [id, url, enabledEvents, status]
  properties:
    id: { type: string, format: uuid }
    url: { type: string, format: uri }
    status: { type: string, enum: [enabled, disabled] }
    enabledEvents: { type: array, items: { $ref: '#/EventEnumV1' } }
    secret: { type: string, minLength: 1 }
    wmiList:
      type: array
      items: { type: string, pattern: '^[A-Z0-9]{3}$' }
      description: "수신할 이벤트를 발생 차량의 WMI로 필터링합니다. 주로 OEM이 자사 WMI 목록을 지정하는 데 사용합니다."
    providerIdList:
      type: array
      items: { type: string, minLength: 1 }
      description: "수신할 이벤트를 Provider ID로 필터링합니다. 주로 eMSP가 자사 Provider ID 목록을 지정하는 데 사용합니다."
    userName: { type: string, description: "Webhook 소유자(등록 주체)의 이름입니다." }
    userRole: { type: string, description: "Webhook 소유자의 역할입니다 (예: oem, emsp)." }

PostEndpointReqV1:
  type: object
  required: [url, enabledEvents]
  properties:
    url: { type: string, format: uri }
    description: { type: string }
    enabledEvents:
      type: array
      items: { $ref: '#/EventEnumV1' }
    # [2026-06-23 회의 합의] 수신 이벤트 필터. actor별 사용 필드가 다르므로 예시를 OEM/eMSP로 구분 제공.
    wmiList:
      type: array
      items: { type: string, pattern: '^[A-Z0-9]{3}$' }
      description: "수신할 이벤트를 발생 차량의 WMI로 필터링합니다(OEM용). 미지정 시 권한 범위 내 모든 WMI 이벤트를 수신합니다. 하나의 OEM이 여러 엔드포인트에 WMI를 분산 등록할 수 있습니다."
    providerIdList:
      type: array
      items: { type: string, minLength: 1 }
      description: "수신할 이벤트를 Provider ID로 필터링합니다(eMSP용). 미지정 시 권한 범위 내 모든 Provider ID 이벤트를 수신합니다."
    status: { type: string, enum: [enabled, disabled], default: enabled }
    metadata: { type: object }

EventEnumV1:
  type: string
  description: |
    시스템에서 발생하는 이벤트 코드 목록입니다.

    | 이벤트 코드 | 비즈니스 의미 | 사용자 로그 예시 |
    | :--- | :--- | :--- |
    | `root.certificate.added` | 신규 Root 인증서가 RCP에 추가됨 | "RCP에 새로운 Root 인증서가 등록되었습니다. 신뢰 저장소를 업데이트하십시오." |
    | `root.certificate.expired` | 기존 Root 인증서가 만료됨 | "Root 인증서가 만료되었습니다. 자연스러운 교체 주기에 해당합니다." |
    | `root.certificate.revoked` | 보안 이슈 등으로 Root가 폐지됨 | "보안 사고로 인해 Root가 폐지되었습니다. 긴급 대응이 필요할 수 있습니다." |
    | `provisioning.certificate.updated` | 차량의 Provisioning 인증서 갱신 | "차량 인증서가 갱신되었습니다. 기존 계약의 재발급이 필요할 수 있습니다." |
    | `provisioning.certificate.deleted` | 차량 정보가 PCP에서 삭제됨 | "차량 정보가 삭제되었습니다. 해당 PCID의 PnC 서비스가 중단됩니다." |
    | `contract.created.for.oem` | OEM용 계약 생성 완료 | "신규 계약 데이터가 생성되어 OEM 백엔드로 전송 준비가 완료되었습니다." |
    | `contract.updated.for.oem` | OEM용 계약 정보 업데이트 | "계약 정보가 갱신되었습니다. 차량에 새로운 계약 설치가 필요합니다." |
    | `contract.deleted.for.oem` | OEM용 계약 삭제 | "계약이 해지되어 시스템에서 삭제되었습니다." |
  enum:
    - root.certificate.added
    - root.certificate.expired
    - root.certificate.revoked
    - provisioning.certificate.updated
    - provisioning.certificate.deleted
    - contract.created.for.oem
    - contract.updated.for.oem
    - contract.deleted.for.oem

WebhookEventV1:
  type: object
  required: [timestamp, eventId, eventType, payload]
  properties:
    timestamp: { type: string, format: date-time, description: "이벤트 발생 시각" }
    eventId: { type: string, format: uuid, description: "이벤트 고유 식별자" }
    eventType: { $ref: '#/EventEnumV1' }
    payload:
      oneOf:
        - $ref: '#/WebhookRootPayloadV1'
        - $ref: '#/WebhookProvisioningPayloadV1'
        - $ref: '#/WebhookContractPayloadV1'
      discriminator:
        propertyName: payloadType
        mapping:
          root: '#/WebhookRootPayloadV1'
          provisioning: '#/WebhookProvisioningPayloadV1'
          contract: '#/WebhookContractPayloadV1'

WebhookRootPayloadV1:
  type: object
  # [2026-06-23 회의 합의] 파싱정보(distinguishedName/commonName) 제거 — 인증서 식별은 rootCertificateId/caCertificate로 충분하며,
  # 상세 정보가 필요하면 RCP 단건 조회(GET /rcp/certificates/{rootCertificateId}) 또는 caCertificate 파싱으로 획득한다.
  required: [payloadType, rootCertificateId]
  properties:
    payloadType: { type: string, enum: [root], description: "페이로드 유형 식별자" }
    rootCertificateId: { type: string, format: uuid }
    rootType: { $ref: '#/PkiTypeV1' }
    caCertificate: { type: string, description: "Base64 DER로 인코딩된 root 인증서입니다. (Optional)" }

WebhookProvisioningPayloadV1:
  type: object
  required: [payloadType, pcid]
  properties:
    payloadType: { type: string, enum: [provisioning], description: "페이로드 유형 식별자" }
    pcid: { $ref: '#/PcidV1' }
    provisioningCertificateChain: { $ref: '#/CertificateChainV1' }
    reason: { type: string, description: "상태 변경 사유 (예: Factory Reset, Re-provisioning)" }

WebhookContractPayloadV1:
  type: object
  required: [payloadType, emaid, pcid]
  properties:
    payloadType: { type: string, enum: [contract], description: "페이로드 유형 식별자" }
    emaid: { $ref: '#/EmaidV1' }
    pcid: { $ref: '#/PcidV1' }
    contractCertificateChain: { $ref: '#/CertificateChainV1' }
    certificateValidTo: { type: string, format: date-time }
    reason: { type: string, description: "상태 변경 사유 (예: Factory Reset, Re-provisioning)" }

# --- eMSP (Managed) Service Schemas ---

ManagedContractRequestV1:
  type: object
  description: |
    연산 능력이 없는 eMSP를 위한 계약 발급 및 등록 요청 데이터입니다.
    이 요청을 받은 시스템은 내부적으로 키 생성, 인증서 발급, 암호화, 서명 및 CCP 저장을 모두 대행합니다.
  required: [pcid, emaid, certificateValidFrom, certificateValidTo, xsdMsgDefNamespace]
  properties:
    pcid: { $ref: '#/PcidV1' }
    emaid: { $ref: '#/EmaidV1' }
    certificateValidFrom:
      type: string
      format: date-time
      description: |
        계약 인증서의 유효 시작 일시입니다. 과거 날짜 입력은 허용되지 않으며, 
        입력된 날짜가 서버 수신 시각보다 이전인 경우 서버 정책에 따라 현재 시각으로 자동 조정될 수 있습니다.
    certificateValidTo:
      type: string
      format: date-time
      description: |
        계약 인증서의 만료 예정 일시입니다. ISO 15118 표준에 따라 해당 PCID의 
        Provisioning 인증서 유효 기간을 초과할 수 없으며, PKI 시스템 정책상 허용되는 
        최대 유효 기간(예: 발급일로부터 최대 2년) 내로 설정해야 합니다. 
        제약 조건을 위반한 요청에 대해서는 400 Bad Request를 반환합니다.
    xsdMsgDefNamespace: { $ref: '#/XsdMsgDefNamespaceV1' }
    subscriptionUrl: { type: string, format: uri, description: "추가 정보 교환을 위한 eMSP측 구독 URL (Optional)" }

ManagedContractResponseV1:
  type: object
  description: "계약 발급 및 등록 대행 결과입니다. 인증서 상태는 OCSP 규격을 따릅니다."
  required: [pcid, emaid, certificateSerialNumber, status, certificateValidTo]
  properties:
    pcid: { $ref: '#/PcidV1' }
    emaid: { $ref: '#/EmaidV1' }
    certificateSerialNumber:
      type: string
      pattern: '^[0-9a-fA-F]+$'
      description: "발급된 계약 인증서의 고유 시리얼 번호(Hex 문자열)입니다."
    status:
      type: string
      enum: [good, revoked, unknown]
      description: |
        인증서의 기술적 상태:
        - `good`: 유효한 인증서
        - `revoked`: 폐지된 인증서
        - `unknown`: 시스템에서 인지할 수 없는 인증서
    certificateValidTo: { type: string, format: date-time }
    message: { type: string, description: "처리 결과 상세 메시지" }

Pagination:
  type: object
  required: [totalCount, offset, limit]
  properties:
    totalCount: { type: integer, minimum: 0 }
    offset: { type: integer, minimum: 0 }
    limit: { type: integer, minimum: 1, maximum: 200 }

# --- Migrated from Responses to Schemas ---

ContractDataCollectionV1:
  type: object
  required: [contractDataCollection]
  properties:
    contractDataCollection:
      type: array
      items:
        type: object
        required: [pcid, emaid, certificateValidTo]
        properties:
          pcid: { $ref: '#/PcidV1' }
          emaid: { $ref: '#/EmaidV1' }
          # [2026-06-23 회의 합의] 체인이 포함되지 않은 계약 인증서 단건은 활용 가치가 없어 제거함.
          # 인증서 본문/체인이 필요한 경우 Protocol API(GET /ccp/signed-contract-data/{emaid}/{pcid})를 사용한다.
          # 관리용 조회는 유효기간 등 메타데이터만 제공한다.
          certificateValidFrom: { type: string, format: date-time }
          certificateValidTo: { type: string, format: date-time }
          defaultContract: { type: boolean }
          xsdMsgDefNamespace: { $ref: '#/XsdMsgDefNamespaceV1' }
  example:
    contractDataCollection:
      - pcid: "KRMOTORS1234567890"
        emaid: "KR-KHL-C12345678"
        certificateValidFrom: "2026-01-01T00:00:00Z"
        certificateValidTo: "2027-01-01T23:59:59Z"
        defaultContract: true
        xsdMsgDefNamespace: "urn:iso:15118:2:2013:MsgDef"

SignedContractDataCollectionV1:
  type: object
  required: [signedContractDataCollection]
  properties:
    signedContractDataCollection:
      type: array
      items: { $ref: '#/SignedContractDataV1' }
  example:
    signedContractDataCollection:
      - emaid: "KR-KHL-C12345678"
        pcid: "KRMOTORS1234567890"
        certificateInstallationRes: "hKhK...[EXI]..."
        xsdMsgDefNamespace: "urn:iso:15118:2:2013:MsgDef"
        cpsV2GRootCertificateFingerprint: "a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f61234"

# --- PKI Service Schemas ---

CaCertificateChainResponseV1:
  type: object
  required: [caDomain, certificateChain]
  description: "조회된 CA 인증서 체인 정보를 담은 JSON 응답 스키마입니다."
  properties:
    caDomain:
      type: string
      description: "인증서가 소속된 PKI 도메인 식별자입니다."
    certificateChain:
      type: array
      items: { type: string }
      description: |
        **[인증서 체인 순서 규정]**
        배열은 하위에서 상위 방향(Bottom-to-Top) 순서로 구성됩니다:
        1. [0]: 최하위 Sub-CA (발행자)
        2. [...]: 중간 계층 CA (존재 시)
        3. [마지막]: 최상위 Root CA

EnrollmentRequestV1:
  type: object
  required: [caDomain, iso15118Version, certificateSigningRequest]
  description: "인증서 발급 요청을 위한 JSON 스키마입니다."
  properties:
    caDomain:
      type: string
      enum: [emsp, cpo, oem, cps, veh]
      description: |
        인증서를 발급받을 PKI 도메인임.
        참고: v2g 도메인은 보안 정책상 온라인 발급 요청 대상에서 제외됨.
    iso15118Version:
      $ref: '#/XsdMsgDefNamespaceV1'
    certificateSigningRequest:
      type: string
      description: "Base64 DER 인코딩된 PKCS#10 CSR(Certificate Signing Request) 데이터입니다."

EnrollmentResponseV1:
  type: object
  required: [commonName, certificateSerialNumber, certificate, certificateChain]
  description: "인증서 발급 결과를 담은 JSON 응답 스키마입니다."
  properties:
    commonName:
      type: string
      description: "발급된 인증서의 Common Name 필드 값입니다 (CPO의 경우 evseID)."
    certificateSerialNumber:
      type: string
      pattern: '^[0-9a-fA-F]+$'
      description: "발급된 인증서의 고유 시리얼 번호 (Hex)입니다."
    certificate:
      type: string
      description: "Base64 DER 인코딩된 리프(Leaf) 인증서 본문입니다."
    certificateChain:
      type: array
      items: { type: string }
      description: |
        **[인증서 체인 순서 규정]**
        배열은 하위에서 상위 방향(Bottom-to-Top) 순서로 구성됩니다:
        1. [0]: 리프 인증서를 직접 발행한 **최하위 Sub-CA**
        2. [...]: 중간 계층 CA (존재 시)
        3. [마지막]: 최상위 **Root CA**
