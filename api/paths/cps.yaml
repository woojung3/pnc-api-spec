/cps/contract-data/sign:
  post:
    tags: ["CPS (Contract Provisioning Service)"]
    summary: 계약 데이터 서명
    operationId: signContractDataV1
    description: |
      eMSP가 자체 PKI를 통해 발급한 계약 인증서 번들을 V2G 신뢰 체계(V2G PKI)로 서명하여 완성된 계약 데이터를 생성합니다.

      **[역할 및 책임 분담]**
      - **eMSP:** 계약 인증서 체인 발급, 암호화된 프라이빗 키 생성, DH 공개키 추출 등을 포함한 전체 계약 번들 구성을 완료하여 제출해야 합니다. (eMSP의 자체 PKI 보유 필수)
      - **CPS:** 제출된 번들을 검증한 후, V2G Root 계층의 서명을 추가하여 최종 계약 데이터(EXI 기반)를 완성하고 이를 CCP(Contract Certificate Pool)에 원자적으로 저장하는 역할을 수행합니다.

      본 API의 성공 응답(`201 Created`)은 V2G 서명 완료와 CCP 내 물리적 저장 및 배포 준비가 하나의 트랜잭션으로 완료됨을 보장합니다. 따라서 호출자는 별도의 정합성 검증이나 추가 저장 요청 없이 즉시 CCP를 통해 계약 조회가 가능합니다.
    security:
      - OAuth2_Auth: ["cps:write"]
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [contractCertificateBundle, xsdMsgDefNamespace]
            properties:
              contractCertificateBundle:
                $ref: '../components/schemas/index.yaml#/ContractCertificateBundleV1'
              xsdMsgDefNamespace:
                $ref: '../components/schemas/index.yaml#/XsdMsgDefNamespaceV1'
              cpsV2GRootCertificateFingerprint:
                type: string
                pattern: '^[0-9a-fA-F]{64}$'
                description: "서명에 사용할 특정 V2G Root를 식별하기 위한 SHA-256 지문입니다. 이 지문에 해당하는 Root CA를 최상위 신뢰 앵커로 사용하는 CPS의 키로 서명이 수행됩니다."
    responses:
      '201':
        description: "CPS 서명이 성공적으로 완료되었으며, 서명된 계약 데이터가 CCP에 저장되었습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
      '400': 
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401': 
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403': 
        $ref: '../components/responses/index.yaml#/Forbidden'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500': 
        $ref: '../components/responses/index.yaml#/InternalServerError'
    x-codeSamples:
      - lang: 'cURL'
        label: 'Sign Contract Bundle'
        source: |
          curl -X POST "https://api.kpnc-protocol.kr/v1/cps/contract-data/sign" \
            -H "KPNC-From-Party-Type: emsp" \
            -H "KPNC-From-Party-Id: KR-EMSP-EMSP01" \
            -H "Content-Type: application/json" \
            -d '{
              "contractCertificateBundle": {
                "pcid": "KRMOTORS1234567890",
                "emaid": "KR-KHL-C12345678",
                "contractCertificateChain": { "certificate": "...", "subCa1Certificate": "..." },
                "contractSignatureEncryptedPrivateKey": "...",
                "dhPublicKey": "..."
              },
              "xsdMsgDefNamespace": "urn:iso:15118:2:2013:MsgDef"
            }'

/cps/certificates:
  get:
    tags: ["CPS (Contract Provisioning Service)"]
    summary: CPS 인증서 체인 목록 조회
    operationId: getCpsCertificatesV1
    description: |
      현재 활성화된 모든 CPS(서명 서비스)의 인증서 체인 목록을 조회합니다.
      eMSP 또는 OEM 백엔드는 이 API를 호출하여 CPS가 서명 시 사용하는 하위 CA(Sub CA) 인증서 체인을 확보해야 합니다.
      확보된 체인 정보는 ISO 15118 CertificateInstallationRes 메시지 구성 시 'CPS Certificate Chain' 필드에 포함되어 차량에 전달됩니다.
      보안 정책에 따라 CPS 인증서는 정기적으로 갱신될 수 있으므로, 주기적인 동기화가 권고됩니다.
    security:
      - OAuth2_Auth: ["cps:read"]
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
      - $ref: '../components/parameters/index.yaml#/offset'
      - $ref: '../components/parameters/index.yaml#/limit'
    responses:
      '200':
        description: "CPS 인증서 체인 목록 조회가 성공하였습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
        content:
          application/json:
            schema:
              allOf:
                - $ref: '../components/schemas/index.yaml#/Pagination'
                - type: object
                  properties:
                    cpsCertificateDataCollection:
                      type: array
                      items:
                        $ref: '../components/schemas/index.yaml#/CpsCertificateChainDataV1'
      '400': 
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401': 
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500': 
        $ref: '../components/responses/index.yaml#/InternalServerError'
    x-codeSamples:
      - lang: 'cURL'
        label: 'Fetch CPS Certs'
        source: |
          curl -X GET "https://api.kpnc-protocol.kr/v1/cps/certificates?limit=10" \
            -H "KPNC-From-Party-Type: oem" \
            -H "KPNC-From-Party-Id: KR-OEM-MOTORS"
