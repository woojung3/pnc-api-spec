pncEventReceived:
  post:
    tags: ["Event (Webhook Service)"]
    summary: Webhook 이벤트 수신
    operationId: receiveWebhookEventV1
    description: |
      국가 PnC 인프라 시스템에서 이벤트가 발생했을 때, 연동사가 등록한 수신 엔드포인트 URL로 발송되는 비동기 HTTP POST 요청입니다.

      **[요청 무결성 검증]**
      - 요청 헤더에 `KPNC-Signature`가 포함되어 전달됨
      - 연동사는 수신한 HTTP Body 전체와 엔드포인트 등록 시 발급받은 `secret` 키를 사용하여 HMAC-SHA256 해시를 생성해야 함
      - 생성된 해시값과 헤더의 `KPNC-Signature` 값이 완전히 일치하는지 검증하는 과정이 필요함
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-Signature'
    requestBody:
      description: 발생한 Webhook 이벤트의 상세 데이터 및 페이로드임
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/WebhookEventV1'
    responses:
      '200':
        description: |
          이벤트를 정상적으로 수신하여 성공적으로 처리를 시작함
          수신 측은 추가적인 지연 없이 즉시 `200 OK` 또는 `202 Accepted` 등으로 신속히 응답해야 함
