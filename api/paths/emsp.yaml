/emsp/contracts:
  post:
    tags: ["eMSP Service"]
    summary: 계약 발급 및 등록 대행
    operationId: issueManagedContractV1
    description: |
      연산 능력이 부족한 eMSP를 위한 비즈니스 오케스트레이션 API입니다.
      호출 시 시스템은 내부적으로 다음 절차를 단일 트랜잭션으로 수행합니다:
      1. **차량 검증**: PCP를 통해 대상 PCID의 유효성 및 Provisioning 인증서 확인
      2. **키 생성**: 계약용 키 쌍 생성
      3. **인증서 발급**: PKI 서비스를 통해 eMSP 신뢰체인으로부터 계약 인증서 발급
      4. **데이터 암호화**: 차량의 Provisioning 공개키를 사용하여 프라이빗 키 암호화
      5. **CPS 서명**: CPS를 통한 V2G 기술 서명 추가 및 최종 EXI 데이터 완성
      6. **배포 저장**: 완성된 데이터를 CCP에 즉시 등록
      
      이 과정을 통해 eMSP는 복잡한 암호 연산을 직접 구현하지 않고 PnC 계약을 발급할 수 있습니다.
      응답으로 반환되는 `status`는 OCSP 규격을 따릅니다.
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../components/schemas/index.yaml#/ManagedContractRequestV1'
    responses:
      '201':
        description: "계약 발급 및 CCP 등록이 성공적으로 완료되었습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/ManagedContractResponseV1'
      '400':
        description: "잘못된 요청입니다. PCID/eMAID 형식이 틀렸거나 유효 기간 설정이 부적절합니다."
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403':
        description: "권한이 없습니다. 해당 eMAID 도메인에 대한 관리 권한을 확인하십시오."
        $ref: '../components/responses/index.yaml#/Forbidden'
      '404':
        description: "대상 차량(PCID)이 PCP에 등록되어 있지 않습니다."
        $ref: '../components/responses/index.yaml#/NotFound'
      '409':
        description: "이미 해당 eMAID로 활성화된 계약이 존재합니다."
        content:
          application/problem+json:
            schema: { $ref: '../components/schemas/index.yaml#/ProblemDetailV1' }
            example:
              type: "urn:pnc:error:ccp:contract-already-exists"
              title: "Conflict"
              status: 409
              detail: "해당 eMAID로 이미 유효한 계약이 등록되어 있습니다. 기존 계약을 폐지하거나 새 eMAID를 사용하십시오."
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500':
        description: "내부 오케스트레이션 처리 중 오류가 발생했습니다 (PKI/CPS/CCP 연동 실패 등)."
        $ref: '../components/responses/index.yaml#/InternalServerError'
    x-codeSamples:
      - lang: 'cURL'
        label: 'Managed Issuance'
        source: |
          curl -X POST "https://api.kpnc-protocol.kr/v1/emsp/contracts" \
            -H "KPNC-From-Party-Type: emsp" \
            -H "KPNC-From-Party-Id: KR-EMSP-EMSP01" \
            -H "Content-Type: application/json" \
            -d '{
              "pcid": "KRMOTORS1234567890",
              "emaid": "KR-KHL-C12345678",
              "certificateValidFrom": "2026-06-10T00:00:00Z",
              "certificateValidTo": "2027-06-09T23:59:59Z",
              "xsdMsgDefNamespace": "urn:iso:15118:2:2013:MsgDef"
            }'

/emsp/contracts/{emaid}/{certificateSerialNumber}:
  get:
    tags: ["eMSP Service"]
    summary: 계약 상태 조회
    operationId: getManagedContractStatusV1
    description: |
      특정 eMAID와 인증서 시리얼 번호의 복합키를 사용하여 계약의 현재 기술적 상태를 조회합니다.
      eMAID는 재활용될 수 있으므로, 정확한 인증서 인스턴스를 식별하기 위해 시리얼 번호를 함께 사용해야 합니다.
      상태 값은 OCSP 표준 응답 코드(`good`, `revoked`, `unknown`)를 따릅니다.
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
      - name: emaid
        in: path
        required: true
        schema: { $ref: '../components/schemas/index.yaml#/EmaidV1' }
      - name: certificateSerialNumber
        in: path
        required: true
        description: "조회할 인증서의 고유 시리얼 번호(Hex)입니다."
        schema: { type: string, pattern: '^[0-9a-fA-F]+$' }
    responses:
      '200':
        description: "계약 상태 정보 조회가 성공하였습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
        content:
          application/json:
            schema:
              $ref: '../components/schemas/index.yaml#/ManagedContractResponseV1'
      '400':
        description: "잘못된 요청 파라미터입니다. eMAID 또는 시리얼 번호 형식이 유효하지 않습니다."
        $ref: '../components/responses/index.yaml#/BadRequest'
      '401':
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403':
        $ref: '../components/responses/index.yaml#/Forbidden'
      '404':
        description: "해당 eMAID와 시리얼 번호 조합의 계약을 찾을 수 없습니다."
        $ref: '../components/responses/index.yaml#/NotFound'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500':
        description: "조회 처리 중 서버 내부 오류가 발생했습니다."
        $ref: '../components/responses/index.yaml#/InternalServerError'
    x-codeSamples:
      - lang: 'cURL'
        label: 'Check Contract Status'
        source: |
          curl -X GET "https://api.kpnc-protocol.kr/v1/emsp/contracts/KR-KHL-C12345678/1234abcd" \
            -H "KPNC-From-Party-Type: emsp" \
            -H "KPNC-From-Party-Id: KR-EMSP-EMSP01"

  delete:
    tags: ["eMSP Service"]
    summary: 계약 해지 및 폐지 대행
    operationId: terminateManagedContractV1
    description: |
      사용자의 가입 해지 또는 보안 사고 발생 시 호출하는 비즈니스 종료 API입니다.
      eMAID 재활용에 따른 무결성 보장을 위해 특정 시리얼 번호를 명시하여 폐지를 요청합니다.
      시스템은 다음 과정을 대행합니다:
      1. **인증서 폐지**: PKI 시스템에 해당 시리얼 번호 인증서의 폐지(Revocation)를 요청하여 OCSP에 반영
      2. **데이터 영구 삭제**: CCP 저장소에서 관련 서명 데이터를 삭제
    security:
      - mTLS_Auth: []
      - OAuth2_Auth: []
    parameters:
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Type'
      - $ref: '../components/parameters/index.yaml#/KPNC-From-Party-Id'
      - $ref: '../components/parameters/index.yaml#/KPNC-Trace-Id'
      - name: emaid
        in: path
        required: true
        schema: { $ref: '../components/schemas/index.yaml#/EmaidV1' }
      - name: certificateSerialNumber
        in: path
        required: true
        description: "폐지할 인증서의 고유 시리얼 번호(Hex)입니다."
        schema: { type: string, pattern: '^[0-9a-fA-F]+$' }
      - name: reason
        in: query
        required: false
        description: "해지/폐지 사유입니다."
        schema:
          type: string
          enum: [privilegeWithdrawn, cessationOfOperation, keyCompromise, unspecified]
          default: cessationOfOperation
    responses:
      '204':
        description: "계약 해지 및 폐지 처리가 완료되었습니다."
        headers:
          KPNC-Trace-Id: { $ref: '../components/headers/index.yaml#/TraceIdHeader' }
      '401':
        $ref: '../components/responses/index.yaml#/Unauthorized'
      '403':
        description: "권한이 없습니다. 본인이 발급한 계약만 해지할 수 있습니다."
        $ref: '../components/responses/index.yaml#/Forbidden'
      '404':
        description: "해당 eMAID와 시리얼 번호 조합의 계약을 찾을 수 없습니다."
        $ref: '../components/responses/index.yaml#/NotFound'
      '429':
        $ref: '../components/responses/index.yaml#/TooManyRequests'
      '500':
        description: "폐지 처리 중 PKI 또는 CCP 연동 오류가 발생했습니다."
        $ref: '../components/responses/index.yaml#/InternalServerError'
    x-codeSamples:
      - lang: 'cURL'
        label: 'Terminate Contract'
        source: |
          curl -X DELETE "https://api.kpnc-protocol.kr/v1/emsp/contracts/KR-KHL-C12345678/1234abcd?reason=cessationOfOperation" \
            -H "KPNC-From-Party-Type: emsp" \
            -H "KPNC-From-Party-Id: KR-EMSP-EMSP01"
