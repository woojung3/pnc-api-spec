servers:
  - url: https://api.kpnc-protocol.kr/v1
    description: KPNC Production Environment

security:
  - mTLS_Auth: []
  - OAuth2_Auth: []

tags:
  - name: "RCP (Root Certificate Pool)"
    description: "신뢰의 기반. OEM/eMSP/V2G Root 인증서 저장 및 배포를 담당합니다."
  - name: "eMSP Service"
    description: "연산 능력이 없는 eMSP를 위한 비즈니스 오케스트레이션. 인증서 발급부터 CCP 등록까지의 전 과정을 대행합니다."
  - name: "PCP (Provisioning Certificate Pool)"
    description: "OEM 차량 Provisioning 인증서 저장 및 PCID 조회를 담당합니다."
  - name: "CPS (Contract Provisioning Service)"
    description: "계약 데이터에 V2G 신뢰 체계 기반의 CPS 서명을 수행하고 CCP의 데이터를 총괄 관리하여 배포 준비를 수행합니다."
  - name: "CCP (Contract Certificate Pool)"
    description: "CPS에 의해 관리되는 중앙 저장소로서, 최종 서명된 계약 데이터(Contract Bundle)의 보관 및 배포를 담당합니다."
  - name: "PKI (Public Key Infrastructure)"
    description: "인증서 발급 및 폐지 서비스를 담당합니다."
  - name: "Event (Webhook Service)"
    description: |
      실시간 상태 변경 알림(Webhook) 관리를 담당합니다.

      ### 1. Webhook 이벤트 정의
      본 시스템에서 사용하는 Webhook 이벤트 목록입니다. 상세 데이터 구조는 OpenAPI 스펙의 `WebhookEventV1` 스키마를 참조하십시오.

      > **⚠️ 주의: 본 이벤트 분류 및 명칭은 현재 초안 상태이며, 실제 운영 환경 및 연동 요구사항에 따라 변경될 수 있습니다.**

      | 이벤트 코드 | 비즈니스 의미 |
      | :--- | :--- |
      | `root.certificate.added` | 신규 Root 인증서 추가 |
      | `root.certificate.expired` | Root 인증서 만료 |
      | `root.certificate.revoked` | Root 인증서 폐지 |
      | `provisioning.certificate.updated` | Provisioning 인증서 정보 갱신 |
      | `provisioning.certificate.deleted` | Provisioning 정보 삭제 |
      | `provisioning.certificate.factory.reset` | 차량 공장 초기화에 따른 리셋 |
      | `contract.created.for.oem` | OEM용 계약 생성 완료 (eMSP -> OEM 전송용) |
      | `contract.updated.for.oem` | OEM용 계약 정보 업데이트 |
      | `contract.deleted.for.oem` | OEM용 계약 삭제 |
      | `contract.delivered.to.oem` | OEM 백엔드 계약 수신 성공 |
      | `contract.rejected.by.oem` | OEM 계약 수신 거부 (유효성 검증 실패) |
      | `contract.queued.to.oem` | OEM 처리 대기열 추가 |
      | `contract.installed.on.oem` | OEM 환경 내 계약 설치/적용 완료 |
      | `contract.updated.on.oem` | OEM 환경 내 계약 업데이트 적용 |
      | `contract.deleted.on.oem` | OEM 환경 내 계약 삭제 완료 |

      ### 2. 전달 보장 정책 (Delivery Policy)
      시스템은 일시적인 네트워크 장애나 수신 측 서버의 단기 순단에 대응하기 위해 다음과 같은 공격적인 재시도 정책을 시행합니다.

      - **재시도 전략:** 지수 백오프(Exponential Backoff) 기반 자동 재시도.
      - **재시도 간격 및 횟수:** 총 **5회** 시도 (간격: 1초, 4초, 16초, 64초, 256초).
      - **최대 가용 시간:** 최초 발생 시점으로부터 약 **6분(341초)** 동안 재시도를 수행합니다.
      - **실패 처리:** 5회 재시도 후에도 성공(`2xx`) 응답을 받지 못할 경우, 해당 이벤트 전달은 최종 실패 처리되며 시스템 대기열에서 제거됩니다.
      - **상태 코드 대응:** 타임아웃(10초 이내 무응답) 또는 `2xx` 이외의 모든 응답(4xx, 5xx) 발생 시 재시도를 트리거합니다.

      ### 3. 데이터 정합성 보장을 위한 연동사 준수 사항
      Webhook은 비동기 알림 수단이며, 국가 시스템의 재시도 정책은 '단기 장애 대응'에 초점이 맞춰져 있습니다. 연동 업체는 시스템 간 데이터 무결성을 보장하기 위해 다음 사항을 반드시 구현해야 합니다.

      - **주기적 정합성 대조 (Polling):** 연동사의 시스템 장애가 재시도 정책 시간(6분)보다 길어질 경우를 대비하여, 각 서비스 도메인(CCP, PCP 등)의 조회 API를 활용한 주기적 데이터 동기화 로직을 반드시 갖추어야 합니다.
      - **멱등성(Idempotency) 확보:** 재시도 간격이 짧으므로 동일한 이벤트가 중복 전달될 가능성이 높습니다. 수신 측에서는 `eventId`를 식별자로 사용하여 중복 처리 방지 로직을 반드시 구현해야 합니다.
      - **실시간 공정(EOL) 대응:** 차량 제조 라인(EOL) 등 즉각적인 피드백과 차단형(Blocking) 처리가 필요한 중요한 로직에는 웹훅에만 의존하지 말고, API 응답값 또는 즉시 조회 API를 병행 사용하십시오.

