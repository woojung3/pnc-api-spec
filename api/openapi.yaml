openapi: 3.0.3
info:
  title: 공공 V2G PKI - PnC 가이드라인
  version: 1.0.0
  description: |
    > **[WARNING] 인증 및 보안 체계 정의 관련 안내**
    >
    > 본 규격서의 "인증 및 권한 정책"에 명시된 인증 방식은 검토안이며, 최종안이 아닙니다. 최종 확정 시 별도의 기술 공고를 통해 안내될 예정입니다.

    # 1. 기술 표준 및 운영 개요

    본 가이드라인은 전기차 Plug & Charge (PnC) 서비스 구현을 위해 차량 제조사 (OEM), 모빌리티 운영사업자 (eMSP), 충전사업자 (CPO) 및 V2G PKI Backend 간의 시스템 간 연계 방식과 데이터 흐름을 정의합니다. 또한, PnC운영 환경에서의 주요 시나리오를 기반으로 전기차, 충전기, CSMS (CPO) 및 PKI Backend 간 통신 인터페이스 및 메시지 규격을 명세하며, PnC구조에 적용되는 보안 체계 요구사항에 대해 기술합니다.

    ### 1.1 버전 관리 정책

    본 API 명세서는 `M.m.d` (Major.minor.documentation) 형식을 따릅니다.
    - **Major (M):** API의 하위 호환성이 깨지는 중대한 변경 시 증가 (예: `/v1/` -> `/v2/`)
    - **minor (m):** 기능 추가 또는 호환 가능한 API 변경 시 증가
    - **documentation (d):** 기능적 영향이 없는 문서 설명 보강 또는 오타 수정 시 증가

    ### 1.2 엔드포인트 및 경로 구조
    `https://{host}/v1/{service}/{resource}`
    - 모든 인터페이스는 기능별 서비스 도메인(`rcp`, `pcp`, `ccp`, `cps`, `pki`, `event`)을 기준으로 계층화됩니다.
    - 리소스 간의 관계는 경로(Path)로 표현하며, 필터링 및 복합 조건은 쿼리 파라미터를 활용합니다.

    ### 1.3 시스템 경계 및 책임
    - **연동 범위:** 본 명세는 외부 이해관계자(OEM, CPO, eMSP 등)와 본 시스템 간의 데이터 교환을 위한 공용 인터페이스만을 정의합니다.
    - **제외 범위:** 운영사 내부의 관리자 API, HSM 제어 방식, 시스템 상태 감시 등은 본 문서의 범위 밖(Out-of-scope)입니다.

    #### 1.3.1 eMSP의 책임 및 시스템의 역할
    - **eMSP의 책임:** eMSP는 가입자의 계약 생애주기를 관리할 책임이 있습니다. 연동 방식에 따라 다음 두 가지 모델 중 하나를 선택할 수 있습니다.
        1. **자체 관리 모델:** 자체 PKI 및 연산 능력을 보유한 eMSP는 직접 계약 번들을 구성하여 `CPS` 서명 API를 호출합니다.
        2. **위임 관리 모델:** 연산 능력이 없는 eMSP는 `eMSP Service` API를 통해 인증서 발급부터 등록까지의 전 과정을 시스템에 위임할 수 있습니다.
    - **시스템(CPS/eMSP Service)의 역할:** 시스템은 국가 V2G 신뢰 체계의 서명을 수행하고, 위임 모델의 경우 eMSP를 대신하여 보안 연산 및 데이터 정합성을 보장합니다. 서명과 저장은 하나의 논리적 단위로 처리됩니다.

    ### 1.4 인증서 지문 (Certificate Fingerprint) 규격
    본 시스템에서 사용하는 모든 `fingerprint` 필드는 인증서의 무결성 검증 및 신뢰 앵커(Trust Anchor) 식별을 위한 고유 키로 활용됩니다.

    - **연산 알고리즘:** SHA-256
    - **입력 데이터:** Base64 인코딩이나 PEM 헤더가 제거된 바이너리 DER(Distinguished Encoding Rules) 형식의 인증서 원본 데이터
    - **출력 형식:** 64자리 16진 문자열 (대소문자 구분 없음)
    - **주요 용도:**
        1. **무결성 검증:** 수신한 인증서의 해시값을 직접 계산하여 서버가 제공한 지문과 대조함으로써 전송 중 데이터 변조 여부 확인.
        2. **신뢰 매핑:** 특정 계약 데이터가 어떤 Root CA를 최상위 앵커로 하는 CPS에 의해 서명되었는지 식별 (예: `cpsV2GRootCertificateFingerprint`).
        3. **고유 식별:** UUID와 별개로 인증서 자체의 물리적 특성에 기반한 전역 고유 식별자로 활용.

    ### 1.5 용어 정의 및 약어 (Abbreviations)
    본 명세서에서 사용하는 주요 용어 및 약어에 대한 정의입니다. ISO 15118 및 VDE-AR-E 2802-100-1 표준의 정의를 따릅니다.

    | 약어 | 원어 (Full Name) | 비즈니스 의미 |
    | :--- | :--- | :--- |
    | **CCP** | Contract Certificate Pool | CPS에 의해 서명된 계약 데이터(Contract Bundle)가 저장되는 중앙 저장소 |
    | **CPO** | Charge Point Operator | 충전 인프라를 운영하고 관리하는 사업자 (충전사업자) |
    | **CPS** | Contract Provisioning Service | 계약 인증서에 V2G Root 신뢰를 부여하기 위한 서명 및 CCP 관리 서비스 |
    | **CSR** | Certificate Signing Request | 인증서 발급을 위한 서명 요청 데이터 (PKCS#10) |
    | **eMAID** | e-Mobility Account Identifier | 사용자의 충전 서비스 계약을 식별하는 고유 ID |
    | **eMSP** | e-Mobility Service Provider | 가입자에게 충전 계약 및 서비스를 제공하는 사업자 (서비스사업자) |
    | **EV** | Electric Vehicle | 전기자동차 |
    | **EVSE** | Electric Vehicle Supply Equipment | 전기차 충전기 (충전 지점) |
    | **EXI** | Efficient XML Interchange | XML 데이터를 이진화하여 압축한 데이터 형식 (ISO 15118 메시지 형식) |
    | **OCSP** | Online Certificate Status Protocol | 인증서 유효 상태를 실시간으로 확인하는 프로토콜 |
    | **OEM** | Original Equipment Manufacturer | 차량 제조사 |
    | **PCP** | Provisioning Certificate Pool | 차량의 Provisioning 인증서(출고 인증서)를 저장하고 관리하는 저장소 |
    | **PCID** | Provisioning Certificate Identifier | 차량의 고유 식별자 (ISO 15118 기준) |
    | **PKI** | Public Key Infrastructure | 공개키 기반 구조 (인증서 발급/관리 체계) |
    | **PnC** | Plug & Charge | 케이블 연결만으로 인증, 결제, 충전이 자동으로 이루어지는 서비스 |
    | **RCP** | Root Certificate Pool | 최상위 Root 인증서(V2G, OEM, eMSP 등)들을 관리하는 저장소 |
    | **V2G** | Vehicle to Grid | 전기차와 전력망 간의 상호 작용 및 통신 기술 |
    | **WMI** | World Manufacturer Identifier | 차량 제조사를 식별하는 세계 제조사 번호 (PCID의 첫 3자리) |
    | **AKID** | Authority Key Identifier | 인증서 발급 기관의 공개키 식별자 |
    | **HSM** | Hardware Security Module | 암호화 키를 안전하게 생성, 저장 및 관리하는 하드웨어 장치 |
    | **mTLS** | Mutual Transport Layer Security | 클라이언트와 서버가 서로의 인증서를 검증하는 상호 TLS 인증 |
    | **JWT** | JSON Web Token | 당사자 간에 정보를 JSON 개체로 안전하게 전송하기 위한 개방형 표준 (RFC 7519) |
    | **RBAC** | Role-Based Access Control | 사용자의 역할에 따라 시스템 리소스에 대한 접근 권한을 제어하는 방식 |

    ### 1.6 연동 개발 및 테스트 도구 활용 안내
    본 명세서는 표준 OpenAPI Specification (OAS) 3.0.3을 준수하여 작성되었습니다. 문서 상단의 **[Download]** 버튼을 통해 내려받은 명세 파일(`openapi.json` 또는 `openapi.yaml`)을 활용하여 다음과 같이 개발 생산성을 높일 수 있습니다.

    - **Swagger UI 활용:** 로컬 또는 사내 환경에 Swagger UI를 배포하고 명세 파일을 로드하여 직접적인 API 호출 테스트를 수행할 수 있습니다.
    - **Mock 서버 생성:** `Prism`, `Stoplight` 또는 `Postman`과 같은 도구를 사용하여 명세 기반의 Mock 서버를 즉시 구축하고, 실제 백엔드 구현 전에도 인터페이스 연동 로직을 병행 개발할 수 있습니다.
    - **클라이언트 코드 생성:** `OpenAPI Generator`를 통해 Java, Python, TypeScript 등 다양한 언어의 클라이언트 SDK 및 데이터 모델(DTO)을 자동으로 생성하여 오타 방지 및 개발 시간을 단축할 수 있습니다.

    ---

    # 2. 비즈니스 프로세스 흐름

    대한민국 PnC 생태계의 주요 시나리오별 상세 시퀀스입니다.

    ### 2.1 PnC 전체 라이프사이클
    차량 생산부터 최종 충전 계약 설치까지의 통합 흐름입니다.

    ```mermaid
    sequenceDiagram
        participant OEM as OEM (차량 제조사)
        participant PCP as PCP (인증서 저장소)
        participant EV as EV (전기차)
        participant eMSP as eMSP (서비스 사업자)
        participant CPS as CPS (서명 서비스)
        participant CCP as CCP (계약 저장소)
        participant CPO as CPO (충전 사업자)

        Note over OEM, PCP: 1. 차량 생산 및 준비
        OEM->>PCP: Provisioning 인증서 등록 (PCID 기반)
        OEM->>EV: Provisioning 인증서 및 Root Trust Store 설치

        Note over eMSP, EV: 2. 서비스 가입 및 차량 할당
        eMSP->>PCP: 차량 존재 확인 및 인증서 조회 (PCID)
        PCP-->>eMSP: Provisioning 인증서 체인 반환
        eMSP->>eMSP: eMAID 생성 및 계약 번들 구성

        Note over eMSP, CCP: 3. 계약 데이터 서명 및 배포
        eMSP->>CPS: 계약 번들 서명 요청 (POST /v1/cps/contract-data/sign)
        CPS->>CCP: 서명된 계약 데이터(EXI) 자동 저장
        CPS-->>eMSP: 201 Created

        Note over EV, CCP: 4. 계약 설치 (충전 시)
        EV->>CPO: CertificateInstallationReq (EXI)
        CPO->>CCP: 계약 조회 및 EXI 구성 (POST /v1/ccp/signed-contract-data)
        CCP-->>CPO: CertificateInstallationRes (EXI)
        CPO-->>EV: CertificateInstallationRes (EXI)
    ```

    ### 2.2 계약 설치 및 갱신 프로세스
    충전기(EVSE) 연결 시 실시간으로 계약을 획득하는 흐름입니다.

    ```mermaid
    sequenceDiagram
        participant EV as EV (전기차)
        participant EVSE as EVSE (충전기)
        participant CPO as CPO (충전 사업자)
        participant CCP as CCP (계약 저장소)

        EV->>EVSE: CertificateInstallationReq (EXI)
        EVSE->>CPO: ISO 15118 메시지 중계
        CPO->>CCP: 계약 조회 및 EXI 구성 (POST /v1/ccp/signed-contract-data)
        Note right of CCP: PCID/eMAID 매핑 확인 및 sessionId 반영
        CCP-->>CPO: CertificateInstallationRes (EXI)
        CPO->>EVSE: CertificateInstallationRes (EXI)
        EVSE->>EV: 계약 설치 완료
    ```

    ### 2.3 계약 생성 및 CPS 서명 프로세스
    자체 PKI를 보유한 eMSP가 발급한 계약에 국가 V2G 신뢰를 추가하는 과정입니다.

    ```mermaid
    sequenceDiagram
        participant eMSP as eMSP (서비스 사업자)
        participant CPS as CPS (서명 서비스)
        participant CCP as CCP (계약 저장소)

        eMSP->>eMSP: 자체 PKI로 계약 인증서 발급
        eMSP->>eMSP: Contract Bundle 구성 (Encrypted Private Key 포함)
        eMSP->>CPS: 서명 요청 (POST /v1/cps/contract-data/sign)
        Note over CPS: CPS 서명 및 EXI 생성
        CPS->>CCP: 서명된 데이터 자동 저장 (Internal)
        CPS-->>eMSP: 201 Created
    ```

    ### 2.4 차량 검증 및 Provisioning 정보 획득
    eMSP가 신규 가입자 차량의 유효성을 확인하는 과정입니다.

    ```mermaid
    sequenceDiagram
        participant eMSP as eMSP (서비스 사업자)
        participant PCP as PCP (인증서 저장소)

        eMSP->>PCP: 차량 존재 여부 확인 (GET /v1/pcp/lookup-vehicle/{pcid})
        PCP-->>eMSP: 유효 차량 확인 (200 OK)
        eMSP->>PCP: Provisioning 인증서 체인 조회 (GET /v1/pcp/certificates/{pcid})
        PCP-->>eMSP: 인증서 체인 데이터 반환 (200 OK)
        Note left of eMSP: 획득한 인증서로 계약 데이터 암호화 준비
    ```

    ### 2.5 Managed 계약 생성 프로세스 (eMSP (Managed) 중심)
    자체 연산 능력이 없는 eMSP를 위해 시스템이 발급부터 저장까지 대행하는 흐름입니다.

    ```mermaid
    sequenceDiagram
        participant eMSP as eMSP (Managed)
        participant Service as eMSP Service
        participant PKI as PKI (인증 서비스)
        participant CPS as CPS (서명 서비스)
        participant CCP as CCP (계약 저장소)

        eMSP->>Service: 계약 발급 대행 요청 (POST /v1/emsp/contracts)
        Note over Service: 내부 오케스트레이션 시작
        Service->>PKI: 계약 인증서 발급 요청 (CSR 생성 포함)
        PKI-->>Service: Contract Certificate 반환
        Service->>Service: 프라이빗 키 암호화 및 번들 구성
        Service->>CPS: 서명 요청 (Internal)
        CPS->>CCP: 서명 데이터 저장 (Internal)
        Service-->>eMSP: 201 Created
    ```


    ---

    # 3. 데이터 인코딩 및 공통 규약

    ### 3.1 공통 헤더 규약
    본 시스템의 모든 API 요청과 응답에는 다음의 커스텀 헤더가 사용될 수 있습니다.

    **[요청 헤더: 호출자 식별 및 추적]**
    | 헤더명 | 필수 | 설명 |
    | :--- | :---: | :--- |
    | `KPNC-From-Party-Type` | ✅ | 호출자의 유형 (oem, cpo, emsp, cps 등) |
    | `KPNC-From-Party-Id` | ✅ | 호출 기관의 고유 식별자 (사업자 ID 등) |
    | `KPNC-Trace-Id` | ⬜ | 분산 추적용 고유 ID (UUID v4). 클라이언트가 생성하여 전달할 수 있습니다(비어있을 경우 서버가 생성합니다). |

    **[응답 헤더: 결과 정보 및 속도 제한]**
    | 헤더명 | 필수 | 설명 |
    | :--- | :---: | :--- |
    | `KPNC-Trace-Id` | ✅ | 수신한 ID를 그대로 반환하거나, 요청 시 ID가 누락된 경우 서버가 직접 생성한 ID를 반환하여 추적성을 보장합니다. |
    | `KPNC-Rate-Limit-*` | ⬜ | API 호출 속도 제한(Rate Limiting) 관련 정보를 제공합니다. |

    ### 3.2 데이터 인코딩 규약
    | 데이터 | 인코딩 | 비고 |
    |--------|--------|------|
    | JSON 내 인증서 | Base64 DER | RootCert, ProvisioningCert, ContractCert 등 |
    | CSR | `application/pkcs10` | PKCS 10, RFC 7030 참고 |
    | ISO 15118 메시지 | Base64(EXI) | `certificateInstallationReq/Res` 등 |

    ### 3.3 에러 코드 규약 (API Error Codes)
    모든 실패 응답(4xx, 5xx)의 `errorCode` 필드에는 머신 리더블한 고유 코드가 포함됩니다.

    - **형식:** `{DOMAIN}_{REASON}` (예: `CERT_EXPIRED`, `AUTH_INVALID_PARTY`)
    - **용도:** 클라이언트 측 분기 처리, 다국어 메시지 매핑, 장애 원인 분석 등
    - **상태:** 현재 각 엔드포인트별 상세 에러 코드는 구현 정의 단계에 있으며, 본 규격에서는 형식을 표준화합니다.

    ---

    # 4. 인증 및 권한 정책 (검토안)

    본 시스템의 보안 체계는 국가 PnC 인프라의 요구사항에 따라 지속적으로 검토 중입니다. 현재 논의 중인 기술적 대안들과 `KPNC-From-Party-*` 헤더와의 연계 방안을 아래와 같이 명세합니다.

    ### 4.1 인증 기술 옵션 및 검토 배경
    상호운용성과 보안 강도 사이의 균형을 위해 다음 두 가지 방식을 기술 후보로 고려하고 있습니다. 최종 방식은 보안성 검토 및 사업자 협의를 거쳐 확정될 예정입니다.

    - **옵션 1: mTLS (Mutual TLS)**
        - **특징:** 하드웨어(HSM) 기반 인증서 관리가 가능한 사업자 환경에 적합하며, 인프라 수준에서 가장 강력한 S2S 인증을 제공합니다.
    - **옵션 2: OAuth2 (JWT/Client Credentials)**
        - **특징:** 토큰 기반의 유연한 권한 관리. 세부 권한(Scope) 제어가 용이하며, 클라우드 네이티브 환경에 최적화됨.

    ### 4.2 인증 식별자와 헤더의 연계 검증 (Identity Linkage)
    인증 방식과 관계없이, 호출자의 사칭(Impersonation)을 방지하기 위해 **인증 계층의 주체 정보**와 **애플리케이션 헤더(`KPNC-From-Party-Id`)** 간의 연계 검증이 수행되어야 합니다.

    - **검증 메커니즘 (안):**
        1. **Identity Extraction:** 인증 과정에서 클라이언트의 고유 식별자(인증서 CN 또는 JWT Sub)를 추출합니다.
        2. **Header Comparison:** 추출된 식별자가 API 요청 헤더인 `KPNC-From-Party-Id`와 논리적으로 일치하는지 대조합니다.
        3. **Policy Enforcement:** 두 식별 정보가 불일치할 경우, 인증되지 않은 사용자의 사칭 시도로 간주하여 `401 Unauthorized`를 반환합니다.

    ### 4.3 역할 및 권한 (RBAC)
    인증된 주체의 역할(Party Type)에 따라 리소스별 접근 권한이 차등 부여됩니다.
    - **OEM:** PCID의 WMI(첫 3자리) 기반 소유권 검증 및 자사 차량 데이터 관리 권한.
    - **eMSP:** eMAID 접두사 기반의 가입자 계약 생애주기 관리 및 CPS 서명 요청 권한.
    - **CPO:** 실시간 충전 프로토콜 수행을 위한 CCP 계약 데이터 조회 권한.
    - **Trust Operator:** 본 시스템의 운영 주체로, Root 인증서 등록/삭제 및 시스템 전반의 관리 권한 보유.

    ### 4.4 서비스별 접근 권한 매핑 표 (Draft)
    | 서비스 | 기능 | 권한 유형 | OEM | CPO | eMSP | CPS | Operator |
    | :--- | :--- | :--- | :---: | :---: | :---: | :---: | :---: |
    | **RCP** | [Root 단건 조회](#operation/getRootCertificateV1) | 읽기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **RCP** | [Root 목록 조회](#operation/getRootCertificatesV1) | 읽기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **RCP** | [Root 등록](#operation/postRootCertificateV1) | 쓰기 | ❌ | ❌ | ❌ | ❌ | ✅ |
    | **RCP** | [Root 삭제](#operation/deleteRootCertificateV1) | 삭제 | ❌ | ❌ | ❌ | ❌ | ✅ |
    | **EMSP** | [계약 발급 및 등록 대행](#operation/issueManagedContractV1) | 쓰기 | ❌ | ❌ | ✅ | ❌ | ✅ |
    | **EMSP** | [계약 상태 조회](#operation/getManagedContractStatusV1) | 읽기 | ❌ | ❌ | ✅ | ❌ | ✅ |
    | **EMSP** | [계약 해지 및 폐지 대행](#operation/terminateManagedContractV1) | 삭제 | ❌ | ❌ | ✅ | ❌ | ✅ |
    | **PCP** | [Provisioning 인증서 등록](#operation/addProvisioningCertificateV1) | 쓰기 | ✅ | ❌ | ❌ | ❌ | ✅ |
    | **PCP** | [Provisioning 인증서 삭제](#operation/deleteProvisioningCertificateV1) | 삭제 | ✅ | ❌ | ❌ | ❌ | ✅ |
    | **PCP** | [Provisioning 인증서 조회](#operation/getProvisioningCertificateV1) | 읽기 | ✅ | ❌ | ✅ | ✅ | ✅ |
    | **PCP** | [차량 존재 여부 확인](#operation/lookupVehicleByPcidV1) | 읽기 | ✅ | ❌ | ✅ | ✅ | ✅ |
    | **CPS** | [CPS 인증서 체인 조회](#operation/getCpsCertificatesV1) | 읽기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **CPS** | [계약 데이터 CPS 서명](#operation/signContractDataV1) | 쓰기 | ❌ | ❌ | ✅ | ❌ | ❌ |
    | **CCP** | [CertInstReq 기반 검색](#operation/lookupSignedContractDataByReqV1) | 읽기 | ❌ | ✅ | ❌ | ❌ | ❌ |
    | **CCP** | [계약 게시 철회](#operation/deleteSignedContractDataByEmaidV1) | 삭제 | ❌ | ❌ | ✅ | ❌ | ✅ |
    | **CCP** | [eMAID 기준 계약 조회](#operation/getContractDataByEmaidV1) | 읽기 | ✅ | ✅ | ✅ | ❌ | ✅ |
    | **CCP** | [PCID 기준 계약 조회](#operation/getContractDataByPcidV1) | 읽기 | ✅ | ❌ | ❌ | ❌ | ✅ |
    | **CCP** | [서명된 계약 단건 조회](#operation/getSignedContractDataByEmaidAndPcidV1) | 읽기 | ✅ | ❌ | ❌ | ❌ | ✅ |
    | **PKI** | [인증서 발급](#operation/enrollCertificateV1) | 읽기/쓰기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **PKI** | [CA 인증서 체인 조회](#operation/getCaCertsV1) | 읽기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **PKI** | [인증서 폐지 요청](#operation/revokeCertV1) | 쓰기 | ✅ | ✅ | ✅ | ❌ | ✅ |
    | **EVENT** | [Webhook 목록 조회](#operation/getWebhookEndpointsV1) | 읽기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **EVENT** | [Webhook 등록](#operation/postEndpointV1) | 쓰기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **EVENT** | [Webhook 단건 조회](#operation/getWebhookEndpointV1) | 읽기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **EVENT** | [Webhook 수정](#operation/updateWebhookEndpointV1) | 쓰기 | ✅ | ✅ | ✅ | ✅ | ✅ |
    | **EVENT** | [Webhook 삭제](#operation/deleteWebhookEndpointV1) | 삭제 | ✅ | ✅ | ✅ | ✅ | ✅ |

    ---

    # 5. 속도 제한 정책
    시스템의 안정적인 운영과 공정한 자원 배분을 위해 모든 API 엔드포인트에 대해 다음과 같은 속도 제한이 적용됩니다.

    | 구분 | 제한 수치 | 기준 | 비고 |
    | :--- | :--- | :--- | :--- |
    | 전체 API 공통 | 30회 / min | 클라이언트별 | 소스 IP 또는 식별 주체 기준 |

    - **제한 방식:** 클라이언트별 단위 시간당 요청 횟수를 제한합니다. 클라이언트 식별은 원활한 연동과 인프라 효율성을 위해 기본적으로 **소스 IP(Source IP)**를 기준으로 수행함을 원칙으로 합니다.
    - **응답 헤더:** 모든 API 응답(성공/실패 포함)에는 다음 헤더가 포함될 수 있습니다.
      - `KPNC-Rate-Limit-Limit`: 허용된 최대 요청 수
      - `KPNC-Rate-Limit-Remaining`: 현재 남은 요청 가능 수
      - `KPNC-Rate-Limit-Reset`: 초기화까지 남은 시간 (초)
    - **초과 시 대응:** 제한 초과 시 `429 Too Many Requests` 에러가 반환되며, `Retry-After` 헤더를 통해 재시도 가능 시간을 안내합니다.

    > **[Note]** 
    >
    > 본 명세서의 가독성을 위해 성공 응답(2xx)에는 위 헤더들을 명시적으로 정의하지 않았으나, 실제 런타임에서는 모든 응답에 포함되어 전달됩니다. `429 Too Many Requests` 응답 시에는 클라이언트의 즉각적인 대응(Retry-After 확인 등)을 돕기 위해 헤더 정보가 명세에 상세히 기술되어 있습니다.

