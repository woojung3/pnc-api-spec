# --- Common Responses ---

BadRequest:
  description: "잘못된 요청 (Invalid Request)"
  headers:
    KPNC-Trace-Id: { $ref: '../headers/index.yaml#/TraceIdHeader' }
  content:
    application/problem+json:
      schema: { $ref: '../schemas/index.yaml#/ProblemDetailV1' }

Unauthorized:
  description: "인증 실패 (Unauthorized)"
  headers:
    KPNC-Trace-Id: { $ref: '../headers/index.yaml#/TraceIdHeader' }
  content:
    application/problem+json:
      schema: { $ref: '../schemas/index.yaml#/ProblemDetailV1' }

Forbidden:
  description: "권한 부족 (Forbidden)"
  headers:
    KPNC-Trace-Id: { $ref: '../headers/index.yaml#/TraceIdHeader' }
  content:
    application/problem+json:
      schema: { $ref: '../schemas/index.yaml#/ProblemDetailV1' }

NotFound:
  description: "리소스 없음 (Not Found)"
  headers:
    KPNC-Trace-Id: { $ref: '../headers/index.yaml#/TraceIdHeader' }
  content:
    application/problem+json:
      schema: { $ref: '../schemas/index.yaml#/ProblemDetailV1' }

Conflict:
  description: "데이터 충돌 (Conflict)"
  headers:
    KPNC-Trace-Id: { $ref: '../headers/index.yaml#/TraceIdHeader' }
  content:
    application/problem+json:
      schema: { $ref: '../schemas/index.yaml#/ProblemDetailV1' }

TooManyRequests:
  description: "호출 한도 초과 (Too Many Requests)"
  headers:
    KPNC-Trace-Id: { $ref: '../headers/index.yaml#/TraceIdHeader' }
    KPNC-Rate-Limit-Limit: { $ref: '../headers/index.yaml#/RateLimitLimitHeader' }
    KPNC-Rate-Limit-Remaining: { $ref: '../headers/index.yaml#/RateLimitRemainingHeader' }
    KPNC-Rate-Limit-Reset: { $ref: '../headers/index.yaml#/RateLimitResetHeader' }
    Retry-After:
      description: "재시도 전 대기해야 하는 시간(초) 또는 일시"
      schema: { type: string }
  content:
    application/problem+json:
      schema: { $ref: '../schemas/index.yaml#/ProblemDetailV1' }

InternalServerError:
  description: "서버 내부 오류 (Internal Server Error)"
  headers:
    KPNC-Trace-Id: { $ref: '../headers/index.yaml#/TraceIdHeader' }
  content:
    application/problem+json:
      schema: { $ref: '../schemas/index.yaml#/ProblemDetailV1' }


