TraceIdHeader:
  description: |
    분산 추적용 고유 트랜잭션 ID (응답용).
    클라이언트가 요청 시 보낸 ID를 반환하거나, 요청에 ID가 누락된 경우 서버가 직접 생성한 ID를 반환합니다. 이를 통해 전 구간 트랜잭션 추적 및 로그 교차 조회가 가능합니다.
  schema:
    type: string
    format: uuid
RateLimitLimitHeader:
  description: 특정 시간당 허용되는 최대 요청 횟수
  schema: { type: integer }
RateLimitRemainingHeader:
  description: 현재 남은 요청 가능 횟수
  schema: { type: integer }
RateLimitResetHeader:
  description: 요청 횟수가 초기화될 때까지 남은 시간 (초)
  schema: { type: integer }
